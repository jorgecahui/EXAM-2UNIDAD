services:
  db:
    image: postgres:17-alpine
    container_name: postgres_sales
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sales_db}
      - POSTGRES_USER=${POSTGRES_USER:-sales_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sales_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sales_user} -d ${POSTGRES_DB:-sales_db}"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build: .
    container_name: django_sales_app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - POSTGRES_DB=${POSTGRES_DB:-sales_db}
      - POSTGRES_USER=${POSTGRES_USER:-sales_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sales_pass}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - USE_JWT=${USE_JWT:-false}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: